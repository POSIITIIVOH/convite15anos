<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite de 15 Anos ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#d4af37;
  --glow:rgba(212,175,55,0.8);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

.background{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top left,rgba(212,175,55,0.25),transparent 40%),
             radial-gradient(circle at bottom right,rgba(212,175,55,0.25),transparent 40%);
  z-index:-2;
}

.confetti{
  position:fixed;
  inset:0;
  background-image:radial-gradient(var(--primary) 2px,transparent 2px);
  background-size:40px 40px;
  animation:fall 12s linear infinite;
  opacity:.4;
  z-index:-1;
}

@keyframes fall{
  from{background-position:0 -500px}
  to{background-position:0 1000px}
}

.fade{
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  font-size:3.5rem;
  color:var(--primary);
  text-shadow:0 0 20px var(--glow);
}

.btn{
  padding:15px 35px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,var(--primary),#fff1a8);
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 20px var(--glow);
  transition:.3s;
}

.btn:hover{transform:scale(1.1)}

section{
  max-width:800px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:rgba(0,0,0,0.7);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(212,175,55,0.3);
  box-shadow:0 0 20px rgba(212,175,55,0.3);
}

/* CONTADOR */
.countdown{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:10px;
  text-align:center;
}

.time-box{
  flex:1;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

.time-box span{
  display:block;
  font-size:1.8rem;
  color:var(--primary);
}

/* PLAYER */
.music-box{margin-top:20px;text-align:center}

audio{width:100%;margin-top:10px}

.theme{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.theme button{
  width:35px;height:35px;border-radius:50%;border:none;cursor:pointer;
}

.gold{background:#d4af37}
.rose{background:#ff6fb1}
.violet{background:#7b5cff}

footer{text-align:center;padding:30px;opacity:.6}
</style>
</head>
<body>

<div class="background"></div>
<div class="confetti"></div>

<header class="fade">
<h1>✨ Meus 15 Anos ✨</h1>
<p>Uma noite inesquecível</p>
<button class="btn" onclick="scrollToRSVP()">Confirmar Presença</button>
</header>

<section class="fade">
<div class="card">
<h2>⏳ Contagem Regressiva</h2>
<div class="countdown">
<div class="time-box"><span id="dias">0</span>Dias</div>
<div class="time-box"><span id="horas">0</span>Horas</div>
<div class="time-box"><span id="min">0</span>Min</div>
<div class="time-box"><span id="seg">0</span>Seg</div>
</div>
</div>
</section>

<section class="fade">
<div class="card">
<h2>📍 Informações</h2>
<p><strong>Data:</strong> 24/05/2026</p>
<p><strong>Horário:</strong> 19:30</p>
<p><strong>Local:</strong> ———</p>

<div class="music-box">
<p>🎵 Música</p>
<audio controls>
<source src="SUA-MUSICA.mp3" type="audio/mpeg">
</audio>
</div>

</div>
</section>

<section id="rsvp" class="fade">
<div class="card">
<h2>💫 Confirmação</h2>
<form action="#" onsubmit="enviado()">
<input type="text" placeholder="Seu nome" required>
<select required>
<option>Vai comparecer?</option>
<option>Sim</option>
<option>Não</option>
</select>
<button class="btn">Confirmar</button>
</form>
<p id="msg"></p>
</div>
</section>

<div class="theme">
<button class="gold" onclick="setTheme('#d4af37')"></button>
<button class="rose" onclick="setTheme('#ff6fb1')"></button>
<button class="violet" onclick="setTheme('#7b5cff')"></button>
</div>

<footer>Convite interativo ✨</footer>

<script>
function scrollToRSVP(){
  document.getElementById('rsvp').scrollIntoView({behavior:'smooth'});
}

function setTheme(color){
  document.documentElement.style.setProperty('--primary',color);
}

function enviado(){
  document.getElementById('msg').innerHTML='✨ Confirmado!';
}

/* CONTADOR */
const dataFesta=new Date("Dec 20, 2026 20:00:00").getTime();

setInterval(()=>{
  const agora=new Date().getTime();
  const diff=dataFesta-agora;

  const dias=Math.floor(diff/(1000*60*60*24));
  const horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const min=Math.floor((diff%(1000*60*60))/(1000*60));
  const seg=Math.floor((diff%(1000*60))/1000);

  document.getElementById('dias').innerText=dias;
  document.getElementById('horas').innerText=horas;
  document.getElementById('min').innerText=min;
  document.getElementById('seg').innerText=seg;
},1000);
</script>

</body>
</html>
